<style>

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;

  /* Starfield */
  #starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .title-area {
    position: relative; z-index: 10;
    text-align: center;
    padding: 20px 10px 10px;
  }

  .main-title {
    color: #ff4444;

    text-shadow: 3px 3px 0 #8b0000, 0 0 20px #ff4444;
    letter-spacing: 2px;
    animation: titlePulse 2s infinite;
  }

  @keyframes titlePulse {
    0%,100% { text-shadow: 3px 3px 0 #8b0000, 0 0 20px #ff4444; }
    50% { text-shadow: 3px 3px 0 #8b0000, 0 0 40px #ff8844, 0 0 60px #ff4444; }
  }

  .subtitle {
    color: #ffaa44;
    font-size: clamp(6px, 1.2vw, 9px);
    margin-top: 8px;
    animation: blink 1.5s step-end infinite;
  }

  /* Main building wrapper */
  .building-wrapper {
    position: relative; z-index: 10;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    margin-top: 5px;

    flex-direction: column;

    cursor: pointer;
    transition: filter 0.2s;

  canvas.floor-canvas {

    padding: 10px 12px;

    font-size: 7px;
    color: #333;
    padding: 16px;
    text-align: center;
    letter-spacing: 1px;

<script>
// ============================================================
// STARFIELD
// ============================================================
(function(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const stars = Array.from({length:200}, ()=>({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    s: Math.random()*2+0.5,
    sp: Math.random()*0.3+0.1,
    b: Math.random()
  }));
  function drawStars(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.b += 0.02;
      const a = (Math.sin(s.b)+1)/2;
      ctx.fillStyle = `rgba(255,255,255,${a*0.8})`;
      ctx.fillRect(s.x,s.y,s.s,s.s);
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

// ============================================================
// PIXEL ART HELPERS
// ============================================================
const SCALE = 2; // each "pixel" = 2x2 real pixels

function px(ctx, x, y, color, size=1){
  ctx.fillStyle = color;
  ctx.fillRect(x*SCALE, y*SCALE, SCALE*size, SCALE*size);
}

// Draw a pixel lobster at position (cx, cy) facing direction, with anim offset
function drawLobster(ctx, cx, cy, colors, anim=0, variant=0){
  // colors: {body, claw, leg, eye, accent}
  const b = colors.body || '#cc2200';
  const cl = colors.claw || '#ff3300';
  const lg = colors.leg || '#aa1100';
  const ey = colors.eye || '#ffffff';
  const ac = colors.accent || '#ff6644';

  const dy = anim; // vertical bob

  // Body (5x5 pixel art lobster)
  // Head
  px(ctx, cx+1, cy+dy, b);
  px(ctx, cx+2, cy+dy, b);
  px(ctx, cx+3, cy+dy, b);
  // Antennae
  px(ctx, cx, cy-1+dy, ac);
  px(ctx, cx+4, cy-1+dy, ac);
  // Eyes
  px(ctx, cx+1, cy+dy, ey);
  px(ctx, cx+3, cy+dy, ey);
  // Torso
  px(ctx, cx+1, cy+1+dy, b);
  px(ctx, cx+2, cy+1+dy, b);
  px(ctx, cx+3, cy+1+dy, b);
  // Shell segments
  px(ctx, cx+1, cy+2+dy, ac);
  px(ctx, cx+2, cy+2+dy, b);
  px(ctx, cx+3, cy+2+dy, ac);
  // Abdomen
  px(ctx, cx+1, cy+3+dy, b);
  px(ctx, cx+2, cy+3+dy, b);
  px(ctx, cx+3, cy+3+dy, b);
  // Tail
  px(ctx, cx, cy+4+dy, cl);
  px(ctx, cx+1, cy+4+dy, lg);
  px(ctx, cx+2, cy+4+dy, cl);
  px(ctx, cx+3, cy+4+dy, lg);
  px(ctx, cx+4, cy+4+dy, cl);
  // Claws
  if(variant===0){
    px(ctx, cx-1, cy+1+dy, cl);
    px(ctx, cx-1, cy+2+dy, cl);
    px(ctx, cx+5, cy+1+dy, cl);
    px(ctx, cx+5, cy+2+dy, cl);
  } else if(variant===1){ // raised claw
    px(ctx, cx-1, cy+dy, cl);
    px(ctx, cx-2, cy-1+dy, cl);
    px(ctx, cx+5, cy+1+dy, cl);
    px(ctx, cx+5, cy+2+dy, cl);
  } else if(variant===2){ // both raised
    px(ctx, cx-1, cy+dy, cl);
    px(ctx, cx-2, cy-1+dy, cl);
    px(ctx, cx+5, cy+dy, cl);
    px(ctx, cx+6, cy-1+dy, cl);
  }
  // Legs
  px(ctx, cx, cy+2+dy, lg);
  px(ctx, cx+4, cy+2+dy, lg);
  px(ctx, cx, cy+3+dy, lg);
  px(ctx, cx+4, cy+3+dy, lg);
}

// Draw text pixel style (8px font using ctx)
function drawText(ctx, text, x, y, color, size=10){
  ctx.fillStyle = color;
  ctx.font = `${size}px 'Press Start 2P', monospace`;
  ctx.fillText(text, x*SCALE, y*SCALE);
}

// Draw rect
function rect(ctx, x, y, w, h, color){
  ctx.fillStyle = color;
  ctx.fillRect(x*SCALE, y*SCALE, w*SCALE, h*SCALE);
}

// ============================================================
// FLOOR DEFINITIONS
// ============================================================
const FLOOR_W = 350; // logical pixels
const FLOOR_H = 65;  // logical pixels

const floors = [
  {
    id: 'f6', label: '6F', name: '🎉 屋顶派对 ROOFTOP',
    bg: '#0a1a3a', accent: '#4488ff',
    tip: '屋顶派对', tipContent: '🎧 DJ打碟 · 旋转黑胶 · 音频柱闪烁\n🥂 派对碰杯 · 气泡四溅\n🌙 望月发呆 · 思考泡泡漂浮\n🏊 屋顶泳池 · 波光粼粼',
    draw: drawRooftop
  },
  {
    id: 'f5', label: '5F', name: '💼 龙虾公司 LOBSTER INC',
    bg: '#0f1a0f', accent: '#44ff44',
    tip: '龙虾公司', tipContent: '📊 CEO看白板流程图 · 战略部署\n💻 程序员盯滚动代码 · 熬夜debug\n🎨 设计师画原型 · 创意爆发\n🤝 HR面试 · 严肃考核',
    draw: drawOffice
  },
  {
    id: 'f4', label: '4F', name: '💪 健身房 GYM',
    bg: '#1a0a0a', accent: '#ff4444',
    tip: '龙虾健身房', tipContent: '🏋️ 举哑铃 · 龙虾上下抖动\n🏃 跑步机 · 传送带滚动\n🧘 瑜伽室 · 极限拉伸\n🥊 拳击沙袋 · 猛力挥钳',
    draw: drawGym
  },
  {
    id: 'f3', label: '3F', name: '👨‍👩‍👧 家庭楼层 FAMILY',
    bg: '#1a1000', accent: '#ffaa00',
    tip: '家庭楼层', tipContent: '⚽ 看球赛 · TV闪烁绿茵场\n🍳 厨房火焰 · 热气蒸腾\n📚 小孩写作业 · 苦苦思索\n🧶 奶奶织毛衣 · 岁月静好',
    draw: drawFamily
  },
  {
    id: 'f2', label: '2F', name: '🎮 单身公寓 SINGLE',
    bg: '#0a0020', accent: '#aa44ff',
    tip: '单身公寓', tipContent: '🎮 打游戏 · 屏幕子弹横飞\n📱 深夜刷手机 · 蓝光照脸\n🎸 弹吉他 · 音符飘飞\n💤 睡觉打Z · 梦中遨游',
    draw: drawSingle
  },
  {
    id: 'f1', label: '1F', name: '🍽️ 食堂 CANTEEN',
    bg: '#1a0a00', accent: '#ff8800',
    tip: '龙虾食堂', tipContent: '👨‍🍳 大厨炒菜 · 戴高帽\n🪑 顾客等位 · 刷手机\n💰 收银老板娘 · 精打细算\n🛵 外卖小哥 · 风驰电掣',
    draw: drawCanteen
  }
];

// ============================================================
// FLOOR DRAW FUNCTIONS
// ============================================================

// --- 6F ROOFTOP ---
function drawRooftop(ctx, t){
  // Sky gradient
  rect(ctx, 0, 0, FLOOR_W, FLOOR_H, '#050e2a');
  // Stars
  [[10,5],[25,3],[40,8],[60,2],[80,6],[100,4],[120,9],[150,3],[180,7],[200,5],[220,2],[240,8],[260,4],[280,6],[300,3],[320,7],[340,5]].forEach(([x,y])=>{
    const a = (Math.sin(t*0.05+x)*0.5+0.5);
    ctx.globalAlpha = a;
    rect(ctx, x, y, 1, 1, '#ffffff');
    ctx.globalAlpha = 1;
  });

  // Moon
  const moonX = 310, moonY = 5;
  rect(ctx, moonX, moonY, 8, 8, '#ffffaa');
  rect(ctx, moonX+1, moonY+1, 6, 6, '#ffff88');
  rect(ctx, moonX+2, moonY+2, 4, 4, '#ffffff');

  // Floor surface
  rect(ctx, 0, 48, FLOOR_W, 3, '#334455');
  rect(ctx, 0, 51, FLOOR_W, FLOOR_H-51, '#223344');

  // Pool (right side)
  rect(ctx, 250, 40, 70, 12, '#1155aa');
  const waveOff = Math.sin(t*0.08)*2;
  for(let i=0;i<7;i++){
    const wx = 252 + i*9 + waveOff;
    rect(ctx, wx, 42, 5, 1, '#3388ff');
    rect(ctx, wx+2, 44, 4, 1, '#2266cc');
  }
  rect(ctx, 250, 40, 70, 2, '#334466'); // pool edge
  rect(ctx, 248, 38, 74, 3, '#445566'); // pool wall

  // DJ Setup (left area)
  // Table
  rect(ctx, 15, 38, 50, 5, '#445566');
  rect(ctx, 15, 43, 50, 3, '#556677');
  // Vinyl record (spinning)
  const recX = 22, recY = 32;
  const angle = t * 0.15;
  ctx.save();
  ctx.translate(recX*SCALE+5*SCALE, recY*SCALE+5*SCALE);
  ctx.rotate(angle);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0,0,5*SCALE,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(0,0,3*SCALE,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(0,0,1*SCALE,0,Math.PI*2); ctx.fill();
  // grooves
  ctx.strokeStyle = '#444';
  ctx.lineWidth = SCALE*0.5;
  for(let r=2;r<=4;r++){
    ctx.beginPath(); ctx.arc(0,0,r*SCALE,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  // Second vinyl
  const rec2X = 38, rec2Y = 32;
  ctx.save();
  ctx.translate(rec2X*SCALE+5*SCALE, rec2Y*SCALE+5*SCALE);
  ctx.rotate(-angle*0.7);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(0,0,5*SCALE,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath(); ctx.arc(0,0,3*SCALE,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4444ff';
  ctx.beginPath(); ctx.arc(0,0,1*SCALE,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Audio bars
  const barColors = ['#ff4444','#ff8800','#ffff00','#00ff88','#4488ff','#aa44ff'];
  for(let i=0;i<6;i++){
    const h = 5 + Math.floor(Math.abs(Math.sin(t*0.1+i*0.9))*12);
    rect(ctx, 68+i*5, 48-h, 4, h, barColors[i]);
  }

  // DJ lobster
  const djAnim = Math.floor(t/8)%2;
  drawLobster(ctx, 14, 38-10+djAnim, {body:'#cc2200',claw:'#ff4400',leg:'#aa1100',eye:'#ffff00',accent:'#ff6644'}, 0, djAnim===0?1:0);

  // Party lobsters (right area)
  // Lobster with raised glass
  const partyAnim = Math.floor(t/6)%2;

  drawLobster(ctx, 293, 36, {body:'#336688',claw:'#4488aa',leg:'#224466',eye:'#223344',accent:'#5599bb'}, 0, 0);
  // Blanket over lobster
  ctx.globalAlpha = 0.7;
  rect(ctx, 290, 42, 30, 8, '#445566');
  ctx.globalAlpha = 1;
  // ZZZ bubbles
  const zPhase = Math.floor(t/15)%4;
  const zTexts = ['Z','Z','ZZ','ZZZ'];
  if(zPhase < 3){
    for(let z=0;z<=zPhase;z++){
      ctx.globalAlpha = 0.5 + z*0.2;
      drawText(ctx, 'Z', 155+z*5, 20-z*3, '#88aaff', 8+z*2);
      ctx.globalAlpha = 1;
    }
  }
  // Nightstand
  rect(ctx, 275, 46, 12, 10, '#334455');
  // Lamp on nightstand
  rect(ctx, 278, 38, 4, 8, '#888');
  rect(ctx, 275, 36, 10, 3, '#ffff88');
  ctx.globalAlpha = 0.15;
  rect(ctx, 272, 39, 16, 12, '#ffff88');
  ctx.globalAlpha = 1;
}

// --- 1F CANTEEN ---
function drawCanteen(ctx, t){
  rect(ctx, 0, 0, FLOOR_W, FLOOR_H, '#1a0800');
  // Ceiling lights
  for(let i=0;i<FLOOR_W;i+=60){
    rect(ctx, i+15, 0, 30, 3, '#ffee88');
    ctx.globalAlpha = 0.15;
    rect(ctx, i+5, 0, 50, 30, '#ffee88');
    ctx.globalAlpha = 1;
  }
  // Floor tiles
  for(let x=0;x<FLOOR_W;x+=12){
    rect(ctx, x, 56, 10, FLOOR_H-56, x%24===0 ? '#2a1800' : '#221200');
  }

  // Room dividers / sections
  rect(ctx, 87, 30, 2, FLOOR_H-30, '#4a2800');
  rect(ctx, 174, 30, 2, FLOOR_H-30, '#4a2800');
  rect(ctx, 261, 30, 2, FLOOR_H-30, '#4a2800');

  // === Chef Kitchen ===
  // Kitchen counter
  rect(ctx, 0, 38, 87, 6, '#885533');
  rect(ctx, 0, 36, 87, 2, '#aa7744');
  // Wok / pan
  rect(ctx, 15, 28, 20, 8, '#888');
  rect(ctx, 16, 29, 18, 6, '#999');
  // Stir fry contents
  rect(ctx, 17, 30, 16, 4, '#cc8822');
  // Toss animation
  const tossAnim = Math.floor(t/5)%3;
  if(tossAnim===1){
    rect(ctx, 20, 25, 10, 3, '#cc8822');
    rect(ctx, 22, 22, 6, 3, '#ffaa44');
  } else if(tossAnim===2){
    rect(ctx, 18, 22, 14, 4, '#cc8822');
  }
  // Flame
  const fh = 4 + Math.floor(Math.sin(t*0.2)*2);
  rect(ctx, 20, 36-fh, 10, fh, '#ff6600');
  rect(ctx, 22, 34-fh, 6, fh, '#ff9900');
  rect(ctx, 24, 33-fh, 2, fh, '#ffff00');
  // Steam
  for(let s=0;s<3;s++){
    const sy = 24 - ((t*0.4+s*8)%18);
    ctx.globalAlpha = Math.max(0, 1-(sy/24));
    rect(ctx, 18+s*5, sy, 2, 3, '#cccccc');
    ctx.globalAlpha = 1;
  }
  // Chef lobster
  drawLobster(ctx, 44, 26, {body:'#cc5500',claw:'#ff7700',leg:'#aa3300',eye:'#ffffff',accent:'#ff9944'}, 0, 1);
  // Chef hat
  rect(ctx, 45, 20, 7, 2, '#ffffff');
  rect(ctx, 46, 14, 5, 8, '#ffffff');
  rect(ctx, 47, 13, 3, 2, '#ffffff');
  // Spoon in claw
  rect(ctx, 52, 26, 1, 8, '#cccc88');
  rect(ctx, 51, 25, 3, 3, '#cccc88');
  // Pots and pans on hooks
  [[5,15,'#666'],[12,12,'#888'],[20,15,'#777']].forEach(([px2,py2,pc])=>{
    rect(ctx, px2, py2, 6, 5, pc);
    rect(ctx, px2+1, py2-2, 1, 3, '#999');
  });

  // === Waiting Customers ===
  // Tables and chairs
  rect(ctx, 100, 42, 35, 4, '#aa7733');
  rect(ctx, 105, 46, 4, 8, '#886622');
  rect(ctx, 123, 46, 4, 8, '#886622');
  // Seated customer lobster 1 (phone)
  drawLobster(ctx, 103, 31, {body:'#886633',claw:'#aa8844',leg:'#664422',eye:'#0066ff',accent:'#ccaa55'}, 0, 0);
  // Blue phone glow
  ctx.globalAlpha = 0.4;
  rect(ctx, 101, 30, 6, 5, '#0044ff');
  ctx.globalAlpha = 1;
  // Phone rect
  rect(ctx, 102, 30, 5, 8, '#111');
  rect(ctx, 103, 31, 3, 6, '#0033ff');

  // Customer 2 (impatient)
  const impAnim = Math.floor(t/10)%2;
  drawLobster(ctx, 125, 31, {body:'#aa4422',claw:'#cc6644',leg:'#882211',eye:'#ffffff',accent:'#dd8866'}, impAnim, 0);
  // Impatience indicator: sweat drop
  if(impAnim===1){
    rect(ctx, 132, 28, 2, 3, '#4488ff');
  }
  // Menu on table
  rect(ctx, 112, 36, 12, 8, '#cc4444');
  rect(ctx, 113, 37, 10, 6, '#dd5555');
  for(let ml=0;ml<3;ml++) rect(ctx, 114, 38+ml*2, 8, 1, '#ffcccc');

  // === Cashier Counter ===
  // Counter
  rect(ctx, 183, 30, 70, 28, '#aa6633');
  rect(ctx, 183, 28, 70, 2, '#cc8855');
  // Cash register
  rect(ctx, 200, 20, 30, 16, '#333');
  rect(ctx, 201, 21, 28, 6, '#444');
  rect(ctx, 202, 22, 26, 4, '#555');
  // Display
  rect(ctx, 202, 22, 12, 4, '#001100');
  // Price animation
  const price = (Math.floor(t/30)%3+1) * 28 + 8;
  drawText(ctx, '$'+price, 102, 14, '#00ff00', 7);
  // Buttons
  [[214,23,'#ff4444'],[218,23,'#44ff44'],[222,23,'#4444ff'],[226,23,'#ffff44']].forEach(([bx,by,bc])=>{
    rect(ctx, bx, by, 3, 2, bc);
  });
  // Money tray
  rect(ctx, 204, 36, 20, 4, '#887744');
  rect(ctx, 206, 37, 6, 2, '#ffcc44');
  rect(ctx, 215, 37, 6, 2, '#88ff44');
  // Cashier lobster (boss lady)
  drawLobster(ctx, 228, 20, {body:'#cc0066',claw:'#ee2288',leg:'#aa0044',eye:'#ffff00',accent:'#ff44aa'}, 0, 0);
  // Abacus / calculator
  rect(ctx, 238, 28, 10, 8, '#885533');
  for(let ab=0;ab<4;ab++) rect(ctx, 240, 29+ab*2, 6, 1, '#ddaa55');

  // === Delivery Person ===
  // Scooter/bike base
  rect(ctx, 270, 44, 50, 8, '#555');
  rect(ctx, 272, 42, 46, 6, '#666');
  // Wheels
  ctx.strokeStyle = '#888'; ctx.lineWidth = SCALE;
  ctx.beginPath(); ctx.arc(282*SCALE, 54*SCALE, 6*SCALE, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(308*SCALE, 54*SCALE, 6*SCALE, 0, Math.PI*2); ctx.stroke();
  rect(ctx, 282, 54, 2, 2, '#444'); rect(ctx, 308, 54, 2, 2, '#444');
  // Delivery box on back
  rect(ctx, 305, 34, 20, 16, '#ff6600');
  rect(ctx, 306, 35, 18, 14, '#ff8822');
  drawText(ctx, 'EAT', 153, 24, '#ffffff', 7);
  rect(ctx, 307, 30, 16, 2, '#ffaa44');
  // Delivery lobster with helmet
  drawLobster(ctx, 279, 30, {body:'#ff5500',claw:'#ff7700',leg:'#cc3300',eye:'#ffffff',accent:'#ff8844'}, 0, 1);
  // Helmet
  rect(ctx, 280, 25, 7, 5, '#ff6600');
  rect(ctx, 281, 24, 5, 2, '#ff8833');
  rect(ctx, 279, 28, 9, 2, '#cc4400');
  // Motion lines (speedy)
  const speedAnim = Math.floor(t/3)%3;
  for(let sl=0;sl<4;sl++){
    ctx.globalAlpha = [0.8,0.5,0.3][speedAnim%3] || 0.3;
    rect(ctx, 262-sl*8, 38+sl*3, 8-sl, 1, '#ff8800');
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BUILD THE BUILDING
// ============================================================
const building = document.getElementById('building');
const labelContainer = document.getElementById('floorLabels');
const tooltip = document.getElementById('tooltip');
const tipTitle = document.getElementById('tipTitle');
const tipContent = document.getElementById('tipContent');

const canvases = [];
const animTimers = [];

floors.forEach((floor, idx) => {
  // Label
  const lbl = document.createElement('div');
  lbl.className = 'floor-label';
  lbl.textContent = floor.label;
  lbl.style.color = floor.accent;
  labelContainer.appendChild(lbl);

  // Floor div
  const floorDiv = document.createElement('div');
  floorDiv.className = 'floor';
  floorDiv.style.background = floor.bg;
  floorDiv.id = floor.id;

  // Canvas
  const canvas = document.createElement('canvas');
  canvas.className = 'floor-canvas';
  canvas.width = FLOOR_W * SCALE;
  canvas.height = FLOOR_H * SCALE;
  canvas.style.width = '700px';
  canvas.style.height = '130px';
  floorDiv.appendChild(canvas);

  // Floor label overlay
  const floorNameEl = document.createElement('div');
  floorNameEl.style.cssText = `
    position:absolute; left:6px; top:4px;
    font-family:'Press Start 2P',monospace;
    font-size:7px; color:${floor.accent};
    text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    pointer-events:none; z-index:5;
    opacity:0.8;
  `;
  floorNameEl.textContent = floor.name;
  floorDiv.appendChild(floorNameEl);

  // Tooltip events
  floorDiv.addEventListener('mouseenter', (e) => {
    tipTitle.textContent = floor.tip;
    tipContent.textContent = floor.tipContent;
    tooltip.classList.add('visible');
    moveTip(e);
  });
  floorDiv.addEventListener('mousemove', moveTip);
  floorDiv.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

  building.appendChild(floorDiv);
  canvases.push({ canvas, floor });
});

function moveTip(e){
  const x = e.clientX + 15;
  const y = e.clientY + 15;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = Math.min(x, window.innerWidth - tw - 10) + 'px';
  tooltip.style.top = Math.min(y, window.innerHeight - th - 10) + 'px';
}

// ============================================================
// ANIMATION LOOP
// ============================================================
let t = 0;
function animate(){
  t++;
  canvases.forEach(({canvas, floor}) => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    floor.draw(ctx, t);
  });
  requestAnimationFrame(animate);
}
animate();

// CA COPY
// ============================================================
const CA_ADDRESS = 'TBA — 合约地址待公布';

function copyCA(){
  const btn = document.getElementById('caCopy');
  const addr = document.getElementById('caAddress').textContent;
  if(addr.startsWith('TBA')) return;
  navigator.clipboard.writeText(addr).then(()=>{
    btn.textContent = 'COPIED ✓';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = 'COPY ▶'; btn.classList.remove('copied'); }, 2000);
  });
}
